name: to_best
description: TO Best — تطبيق إدارة التدريب الرياضي الاحترافي
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Local Storage
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  cached_network_image: ^3.3.1
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  image_picker: ^1.0.7

  # Media
  video_player: ^2.8.1
  webview_flutter: ^4.5.0
  audioplayers: ^5.2.1

  # Utilities
  intl: ^0.19.0
  crypto: ^3.0.3
  uuid: ^4.3.3
  wakelock_plus: ^1.1.4
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  flutter_local_notifications: ^16.3.0
  permission_handler: ^11.3.0

  # File handling
  file_picker: ^6.1.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
