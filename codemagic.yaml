workflows:
  android-release:
    name: TO Best - Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.tobest.app"
        GOOGLE_PLAY_TRACK: "internal"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          cat >> "$CM_BUILD_DIR/android/key.properties" << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/keystore.jks
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Run tests
        script: flutter test --no-pub || true

      - name: Build APK
        script: |
          flutter build apk \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=1.0.$BUILD_NUMBER

      - name: Build AAB
        script: |
          flutter build appbundle \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=1.0.$BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - admin@tobest.com
        notify:
          success: true
          failure: true

  android-debug:
    name: TO Best - Android Debug
    max_build_duration: 30
    environment:
      flutter: stable
      java: 17

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: develop
          include: true

    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --no-pub
      - name: Build debug APK
        script: flutter build apk --debug

    artifacts:
      - build/**/outputs/**/*.apk
